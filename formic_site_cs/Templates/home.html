<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>formic-site</title>
  <style>
    :root { color-scheme: light; }
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 2rem; max-width: 880px; background: radial-gradient(circle at 20% 20%, #f3f7ff, #ffffff 45%); }
    header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    h1 { margin: 0; letter-spacing: -0.02em; }
    .card { border: 1px solid #e3e6ee; border-radius: 12px; padding: 1.25rem; background: #fff; box-shadow: 0 10px 30px rgba(24, 39, 75, 0.08); }
    img.avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid #e6ebf5; }
    a.button { display: inline-block; padding: 0.65rem 1.1rem; border-radius: 10px; background: linear-gradient(135deg, #1a73e8, #4b8bfa); color: white; text-decoration: none; font-weight: 700; letter-spacing: 0.01em; }
    a.button.secondary { background: #111827; }
    code { background: #f3f5f8; padding: 0.15rem 0.35rem; border-radius: 6px; }
    .chip { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.35rem 0.6rem; border-radius: 999px; font-weight: 600; font-size: 0.9rem; }
    .chip.success { background: #e8f5e9; color: #2e7d32; }
    .chip.neutral { background: #f5f5f5; color: #374151; }
    .pill-link { font-weight: 600; color: #1a73e8; text-decoration: none; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
  </style>
</head>
<body>
  <header>
    {{PICTURE_HTML}}
    <div>
      <h1>formic-site</h1>
      <div><strong>Status:</strong> {{STATUS}}</div>
      <div><strong>User:</strong> {{USER}}</div>
      {{EMAIL_ROW}}
    </div>
  </header>

  <div class="grid">
    <div class="card">
      <h3>Sign in</h3>
      {{LOGIN_BLOCK}}
      <p>You need a Google OAuth Client ID set to complete the sign-in flow.</p>
    </div>

    <div class="card">
      <h3>Protected endpoint</h3>
      <p>Try <code>/secure</code> to hit an endpoint that requires authentication.</p>
    </div>

    {{ABOUT_CARD}}
  </div>
</body>
</html>
